<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- Navbar -->
    <nav class="navbar">
      <a href="#">HOME</a>
      <a href="#">ABOUT</a>
      <a href="#">SERVICE</a>
      <a href="#">CONTACT</a>

    </nav>

    <div class="box">
      <div class="form">
        <h1>SIGN IN</h1>
        <ul>
          <li><input type="text" class="input-box" id="username" placeholder="Username" /></li>
          <li><input type="text" class="input-box" id="email" placeholder="Email" /></li>
          <li><input type="text" class="input-box" id="password" placeholder="Password" /></li>
        </ul>

        <p class="err1" id="err1">Invalid Username</p>
        <p class="err2" id="err2">Invalid Email</p>
        <p class="err3" id="err3">Invalid Password</p>
        <button class="btn" id="btn">Login</button>
      </div>
    </div>

    <script src="java.js"></script>
  </body>
</html>
